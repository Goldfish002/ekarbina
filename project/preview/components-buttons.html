<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { background: #F7F5F2; padding: 20px 24px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.row:last-child { margin-bottom: 0; }
.label { font-size: 10px; color: #969696; letter-spacing: 0.08em; text-transform: uppercase; width: 80px; flex-shrink: 0; }
/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; border: none; cursor: pointer; text-transform: uppercase; }
.btn-primary { background: #B8103A; color: #fff; }
.btn-primary-hover { background: #7A0D28; color: #fff; }
.btn-outline { background: transparent; color: #B8103A; border: 1.5px solid #B8103A; }
.btn-outline-hover { background: transparent; color: #7A0D28; border: 1.5px solid #7A0D28; }
.btn-gold { background: #C9A96E; color: #1A1A1A; }
.btn-ghost { background: transparent; color: #2E2E2E; border: 1.5px solid #EEEBE6; }
.btn-dark { background: #1A1A1A; color: #F7F5F2; }
.btn-sm { padding: 7px 16px; font-size: 11px; }
.btn-lg { padding: 14px 32px; font-size: 15px; }
.btn-disabled { background: #EEEBE6; color: #B8B8B8; cursor: not-allowed; }
</style></head><body>
<div class="row">
  <div class="label">Primary</div>
  <button class="btn btn-primary">Get a Quote</button>
  <button class="btn btn-primary-hover">Hover State</button>
  <button class="btn btn-disabled">Disabled</button>
</div>
<div class="row">
  <div class="label">Outline</div>
  <button class="btn btn-outline">View Services</button>
  <button class="btn btn-outline-hover">Hover State</button>
</div>
<div class="row">
  <div class="label">Variants</div>
  <button class="btn btn-gold">Learn More</button>
  <button class="btn btn-dark">Contact Us</button>
  <button class="btn btn-ghost">Download</button>
</div>
<div class="row">
  <div class="label">Sizes</div>
  <button class="btn btn-primary btn-sm">Small</button>
  <button class="btn btn-primary">Default</button>
  <button class="btn btn-primary btn-lg">Large</button>
</div>
</body></html>
