<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
body { background: #fff; padding: 16px 20px; font-family: 'DM Sans', sans-serif; }
.grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; align-items: end; }
.token { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar { background: #B8103A; border-radius: 2px; width: 100%; }
.label { font-size: 9px; color: #969696; letter-spacing: 0.06em; text-align: center; }
.px { font-size: 9px; color: #2E2E2E; font-weight: 500; text-align: center; }
</style></head><body>
<div class="grid">
  <div class="token"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="label">sp-1</div></div>
  <div class="token"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="label">sp-2</div></div>
  <div class="token"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="label">sp-3</div></div>
  <div class="token"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="label">sp-4</div></div>
  <div class="token"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="label">sp-5</div></div>
  <div class="token"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="label">sp-6</div></div>
  <div class="token"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="label">sp-7</div></div>
  <div class="token"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="label">sp-8</div></div>
  <div class="token"><div class="bar" style="height:96px"></div><div class="px">96</div><div class="label">sp-9</div></div>
  <div class="token"><div class="bar" style="height:120px; opacity:0.4;"></div><div class="px">128</div><div class="label">sp-10</div></div>
</div>
</body></html>
