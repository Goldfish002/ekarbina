<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { background: #fff; padding: 16px 20px; font-family: 'DM Sans', sans-serif; }

</style></head><body>
<div class="row"><div class="size">80px</div><div class="sample-serif" style="font-size:44px;">Ekarbina</div></div>

<div class="row"><div class="size">24px</div><div class="sample-serif" style="font-size:17px;">LED & Illuminated Systems</div></div>
<div class="row"><div class="size">20px</div><div class="sample-sans" style="font-size:15px;font-weight:500;">OVERLINE LABEL — UPPERCASE</div></div>
<div class="row"><div class="size">17px</div><div class="sample-sans" style="font-size:13px;">Body copy, card descriptions, metadata text</div></div>
<div class="row"><div class="size">13px</div><div class="sample-sans" style="font-size:11px;">Captions · Tags · Fine print · Tooltips</div></div>
</body></html>
