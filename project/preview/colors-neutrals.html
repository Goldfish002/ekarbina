<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #fff; padding: 16px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; gap: 6px; }
.swatch { flex: 1; height: 56px; border-radius: 3px; }
.label { font-size: 10px; color: #555; margin-top: 4px; letter-spacing: 0.04em; text-align: center; }
.hex { font-size: 9px; color: #888; text-align: center; }
</style></head><body>
<div class="row">
  <div><div class="swatch" style="background:#0D0D0D"></div><div class="label">950</div><div class="hex">#0D0D0D</div></div>
  <div><div class="swatch" style="background:#1A1A1A"></div><div class="label">900</div><div class="hex">#1A1A1A</div></div>
  <div><div class="swatch" style="background:#2E2E2E"></div><div class="label">800</div><div class="hex">#2E2E2E</div></div>
  <div><div class="swatch" style="background:#3D3D3D"></div><div class="label">700</div><div class="hex">#3D3D3D</div></div>
  <div><div class="swatch" style="background:#555555"></div><div class="label">600</div><div class="hex">#555555</div></div>
  <div><div class="swatch" style="background:#717171"></div><div class="label">500</div><div class="hex">#717171</div></div>
  <div><div class="swatch" style="background:#969696"></div><div class="label">400</div><div class="hex">#969696</div></div>
  <div><div class="swatch" style="background:#B8B8B8"></div><div class="label">300</div><div class="hex">#B8B8B8</div></div>
  <div><div class="swatch" style="background:#D6D6D6"></div><div class="label">200</div><div class="hex">#D6D6D6</div></div>
  <div><div class="swatch" style="background:#EEEBE6; border:1px solid #ddd;"></div><div class="label">100</div><div class="hex">#EEEBE6</div></div>
  <div><div class="swatch" style="background:#F7F5F2; border:1px solid #ddd;"></div><div class="label">50</div><div class="hex">#F7F5F2</div></div>
</div>
</body></html>
