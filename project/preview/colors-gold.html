<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #fff; padding: 16px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; gap: 6px; }
.swatch { flex: 1; height: 56px; border-radius: 3px; }
.label { font-size: 10px; color: #555; margin-top: 4px; letter-spacing: 0.04em; text-align: center; }
.hex { font-size: 9px; color: #888; text-align: center; }
</style></head><body>
<div class="row">
  <div><div class="swatch" style="background:#7A5B2A"></div><div class="label">900</div><div class="hex">#7A5B2A</div></div>
  <div><div class="swatch" style="background:#9C7438"></div><div class="label">800</div><div class="hex">#9C7438</div></div>
  <div><div class="swatch" style="background:#B08840"></div><div class="label">700</div><div class="hex">#B08840</div></div>
  <div><div class="swatch" style="background:#BF9855"></div><div class="label">600</div><div class="hex">#BF9855</div></div>
  <div><div class="swatch" style="background:#C9A96E; outline:2px solid #C9A96E; outline-offset:2px;"></div><div class="label" style="color:#9C7438;font-weight:600;">500 ★</div><div class="hex">#C9A96E</div></div>
  <div><div class="swatch" style="background:#D4BB8A"></div><div class="label">400</div><div class="hex">#D4BB8A</div></div>
  <div><div class="swatch" style="background:#DFCCA8"></div><div class="label">300</div><div class="hex">#DFCCA8</div></div>
  <div><div class="swatch" style="background:#ECDDC5"></div><div class="label">200</div><div class="hex">#ECDDC5</div></div>
  <div><div class="swatch" style="background:#F5EFE0; border:1px solid #eee;"></div><div class="label">100</div><div class="hex">#F5EFE0</div></div>
  <div><div class="swatch" style="background:#FAF7F0; border:1px solid #eee;"></div><div class="label">50</div><div class="hex">#FAF7F0</div></div>
</div>
</body></html>
