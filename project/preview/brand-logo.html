<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { background: #1A1A1A; padding: 28px 36px; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 48px; }
.logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.logo { width: 72px; height: 72px; border-radius: 50%; background: #B8103A; display: flex; align-items: center; justify-content: center; }
.logo img { width: 60px; height: 60px; object-fit: contain; }
.wordmark { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: #F7F5F2; letter-spacing: 0.12em; text-transform: uppercase; }
.tagline { font-size: 10px; color: #C9A96E; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500; }
.divider { width: 1px; height: 80px; background: #2E2E2E; }
.logo-sm { width: 40px; height: 40px; border-radius: 50%; background: #B8103A; }
.logo-sm img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
.light-bg { background: #F7F5F2; border-radius: 4px; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.wordmark-dark { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: #1A1A1A; letter-spacing: 0.1em; text-transform: uppercase; }
</style></head><body>
<div class="logo-wrap">
  <div class="logo"><img src="../assets/ekarbina-logo.png" alt="Ekarbina"></div>
  <div class="wordmark">Ekarbina</div>
  <div class="tagline">Precision Signage</div>
</div>
<div class="divider"></div>
<div class="light-bg">
  <div class="logo-sm"><img src="../assets/ekarbina-logo.png" alt="Ekarbina"></div>
  <div class="wordmark-dark">Ekarbina</div>
</div>
</body></html>
