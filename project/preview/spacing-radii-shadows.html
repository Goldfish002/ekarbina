<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
body { background: #F7F5F2; padding: 20px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
.group { }
.label { font-size: 10px; color: #969696; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.cards { display: flex; gap: 14px; }
.card { width: 80px; height: 50px; background: #fff; display: flex; align-items: center; justify-content: center; }
.sublabel { font-size: 9px; color: #717171; text-align: center; margin-top: 5px; }

.shadow-section { display: flex; gap: 20px; margin-bottom: 20px; }
.shadow-card { width: 90px; height: 56px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #717171; }

.radius-section { display: flex; gap: 16px; align-items: center; margin-top: 4px; }
.radius-box { background: #fff; border: 1px solid #EEEBE6; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #717171; }
.divider { width: 1px; height: 40px; background: #EEEBE6; margin: 0 4px; }
</style></head><body>
<div class="label">Shadows / Elevation</div>
<div class="shadow-section">
  <div><div class="shadow-card" style="box-shadow: 0 1px 4px rgba(0,0,0,0.06);">Low</div><div class="sublabel">shadow-low</div></div>
  <div><div class="shadow-card" style="box-shadow: 0 2px 12px rgba(0,0,0,0.10);">Mid</div><div class="sublabel">shadow-mid</div></div>
  <div><div class="shadow-card" style="box-shadow: 0 8px 32px rgba(0,0,0,0.16);">High</div><div class="sublabel">shadow-high</div></div>
</div>
<div class="label">Border Radius</div>
<div class="radius-section">
  <div><div class="radius-box" style="border-radius:2px;">2px</div><div class="sublabel">sm / pill</div></div>
  <div><div class="radius-box" style="border-radius:4px;">4px</div><div class="sublabel">md / default</div></div>
  <div><div class="radius-box" style="border-radius:6px;">6px</div><div class="sublabel">lg</div></div>
</div>
</body></html>
