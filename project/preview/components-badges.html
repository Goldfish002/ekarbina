<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { background: #F7F5F2; padding: 20px 24px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 2px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
.badge-red { background: #FDF0F3; color: #B8103A; border: 1px solid #F5D0D9; }
.badge-gold { background: #FAF7F0; color: #9C7438; border: 1px solid #ECDDC5; }
.badge-dark { background: #2E2E2E; color: #F7F5F2; }
.badge-outline { background: transparent; color: #555; border: 1px solid #D6D6D6; }
.badge-success { background: #EEF6F1; color: #2D7D4E; border: 1px solid #C3E0CE; }
.dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.tag { display: inline-flex; padding: 5px 12px; border-radius: 2px; font-size: 12px; font-weight: 400; border: 1px solid #EEEBE6; background: #fff; color: #2E2E2E; }
.tag-active { background: #B8103A; color: #fff; border-color: #B8103A; }
</style></head><body>
<div class="row">
  <span class="badge badge-red"><span class="dot" style="background:#B8103A"></span>LED Signage</span>
  <span class="badge badge-gold"><span class="dot" style="background:#C9A96E"></span>Premium</span>
  <span class="badge badge-dark">Fabrication</span>
  <span class="badge badge-outline">Outdoor</span>
  <span class="badge badge-success"><span class="dot" style="background:#2D7D4E"></span>Installed</span>
</div>
<div class="row">
  <span class="tag tag-active">All</span>
  <span class="tag">LED</span>
  <span class="tag">Acrylic</span>
  <span class="tag">Pylon</span>
  <span class="tag">3D Lettering</span>
  <span class="tag">Steel</span>
  <span class="tag">Brass</span>
</div>
</body></html>
