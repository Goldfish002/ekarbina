<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #fff; padding: 16px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; gap: 6px; }
.swatch { flex: 1; height: 56px; border-radius: 3px; position: relative; }
.label { font-size: 10px; color: #555; margin-top: 4px; letter-spacing: 0.04em; text-align: center; }
.hex { font-size: 9px; color: #888; text-align: center; }
</style></head><body>
<div class="row">
  <div><div class="swatch" style="background:#6B051E"></div><div class="label">900</div><div class="hex">#6B051E</div></div>
  <div><div class="swatch" style="background:#7A0D28"></div><div class="label">800</div><div class="hex">#7A0D28</div></div>
  <div><div class="swatch" style="background:#960F30"></div><div class="label">700</div><div class="hex">#960F30</div></div>
  <div><div class="swatch" style="background:#A80D32"></div><div class="label">600</div><div class="hex">#A80D32</div></div>
  <div><div class="swatch" style="background:#B8103A; outline: 2px solid #B8103A; outline-offset:2px;"></div><div class="label" style="color:#B8103A;font-weight:600;">500 ★</div><div class="hex">#B8103A</div></div>
  <div><div class="swatch" style="background:#C9264E"></div><div class="label">400</div><div class="hex">#C9264E</div></div>
  <div><div class="swatch" style="background:#D85070"></div><div class="label">300</div><div class="hex">#D85070</div></div>
  <div><div class="swatch" style="background:#E88FA2"></div><div class="label">200</div><div class="hex">#E88FA2</div></div>
  <div><div class="swatch" style="background:#F5D0D9"></div><div class="label">100</div><div class="hex">#F5D0D9</div></div>
  <div><div class="swatch" style="background:#FDF0F3; border:1px solid #eee;"></div><div class="label">50</div><div class="hex">#FDF0F3</div></div>
</div>
</body></html>
